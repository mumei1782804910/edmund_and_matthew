<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2b2440">
<title>Maze Chase — Edmund &amp; Matthew</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; touch-action:none; overscroll-behavior:none; }
  body {
    font-family: "Trebuchet MS", "Comic Sans MS", system-ui, sans-serif;
    background: linear-gradient(180deg,#2b2440 0%,#3d3160 60%,#4a3b74 100%);
    color:#fff; user-select:none; -webkit-user-select:none;
  }
  .screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; }
  .hidden { display:none !important; }

  /* ---------- menu ---------- */
  #menu { justify-content:center; gap:14px; padding:20px; text-align:center; }
  #menu h1 { font-size: clamp(26px, 8vw, 44px); letter-spacing:1px; text-shadow:0 3px 0 rgba(0,0,0,.35); }
  #menu h1 .ipad-emoji { display:inline-block; transform:rotate(-8deg); }
  #menu p.sub { opacity:.85; font-size:15px; max-width:340px; line-height:1.45; }
  #cards { display:flex; gap:16px; margin-top:6px; }
  .card {
    background:rgba(255,255,255,.10); border:3px solid rgba(255,255,255,.25);
    border-radius:20px; padding:14px 18px 12px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    transition:transform .1s;
  }
  .card:active { transform:scale(.94); }
  .card canvas { width:110px; height:130px; }
  .card .nm { font-weight:bold; font-size:20px; }
  .card.edmund { box-shadow:0 0 0 0 #4f8ef7; } .card.edmund .nm{ color:#8fb8ff; }
  .card.matthew .nm{ color:#ff9d8f; }
  #best { font-size:13px; opacity:.7; }
  #levelSel { display:flex; align-items:center; gap:14px; margin-top:4px; }
  .lvlBtn {
    width:46px; height:46px; border:none; border-radius:14px; cursor:pointer;
    background:rgba(255,255,255,.18); color:#fff; font-size:26px; font-weight:bold;
    font-family:inherit; display:flex; align-items:center; justify-content:center;
  }
  .lvlBtn:active { background:rgba(255,255,255,.4); transform:scale(.92); }
  .lvlBtn:disabled { opacity:.3; }
  #lvlLabel { font-size:20px; font-weight:bold; min-width:92px; text-align:center; }
  #lvlFoes { font-size:15px; opacity:.85; letter-spacing:2px; min-height:20px; }
  .howto { font-size:13px; opacity:.75; max-width:330px; line-height:1.5; }

  /* ---------- game ---------- */
  #game { justify-content:flex-start; }
  #hud {
    width:100%; display:flex; align-items:center; gap:10px;
    padding: calc(6px + env(safe-area-inset-top)) 14px 6px; font-weight:bold;
  }
  #hudLevel { font-size:16px; white-space:nowrap; }
  #timeBarWrap { flex:1; height:14px; background:rgba(0,0,0,.35); border-radius:8px; overflow:hidden; }
  #timeBar { height:100%; width:100%; background:#6fe08b; border-radius:8px; transition:width .2s linear; }
  #hudTime { font-size:18px; min-width:44px; text-align:right; font-variant-numeric:tabular-nums; }
  #canvasWrap { flex:1; width:100%; display:flex; align-items:center; justify-content:center; position:relative; min-height:0; padding:4px; }
  #cv { border-radius:10px; box-shadow:0 6px 24px rgba(0,0,0,.45); }
  #banner {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size: clamp(30px,10vw,56px); font-weight:bold; pointer-events:none;
    text-shadow:0 3px 0 rgba(0,0,0,.5); color:#ffe66d;
  }
  #dpad {
    display:grid; grid-template-columns:repeat(3,64px); grid-template-rows:repeat(2,54px);
    gap:6px; padding: 8px 0 calc(12px + env(safe-area-inset-bottom));
  }
  .dbtn {
    background:rgba(255,255,255,.14); border:2px solid rgba(255,255,255,.3); border-radius:14px;
    color:#fff; font-size:24px; display:flex; align-items:center; justify-content:center;
    touch-action:none;
  }
  .dbtn:active { background:rgba(255,255,255,.35); }
  #btnUp{ grid-column:2; grid-row:1; } #btnLeft{ grid-column:1; grid-row:2; }
  #btnDown{ grid-column:2; grid-row:2; } #btnRight{ grid-column:3; grid-row:2; }

  /* ---------- overlay ---------- */
  #overlay {
    position:fixed; inset:0; background:rgba(20,15,40,.75); display:flex;
    align-items:center; justify-content:center; z-index:20;
  }
  #ovCard {
    background:#3d3160; border:3px solid rgba(255,255,255,.3); border-radius:22px;
    padding:26px 30px; text-align:center; max-width:320px; width:86%;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
  }
  #ovTitle { font-size:28px; margin-bottom:8px; }
  #ovMsg { font-size:15px; opacity:.9; margin-bottom:18px; line-height:1.45; }
  .btn {
    display:block; width:100%; margin-top:10px; padding:13px; font-size:18px; font-weight:bold;
    border:none; border-radius:14px; cursor:pointer; color:#2b2440; background:#ffe66d;
    font-family:inherit;
  }
  .btn.secondary { background:rgba(255,255,255,.2); color:#fff; }
  .btn:active { transform:scale(.96); }
</style>
</head>
<body>

<div id="menu" class="screen">
  <h1>Maze Chase <span class="ipad-emoji">📱</span></h1>
  <p class="sub">Grab the iPad before the timer runs out — and don't get caught!</p>
  <div id="cards">
    <div class="card edmund" data-hero="edmund">
      <canvas id="pvE" width="110" height="130"></canvas>
      <div class="nm">Edmund</div>
    </div>
    <div class="card matthew" data-hero="matthew">
      <canvas id="pvM" width="110" height="130"></canvas>
      <div class="nm">Matthew</div>
    </div>
  </div>
  <div id="levelSel">
    <button class="lvlBtn" id="lvlMinus">−</button>
    <div id="lvlLabel">Level 1</div>
    <button class="lvlBtn" id="lvlPlus">+</button>
  </div>
  <div id="lvlFoes"></div>
  <p class="howto">Swipe on the maze (or use the arrows) to run.<br>
  Watch out for the other brother, the budgies 🐦 and the Shiba Inus 🐕!</p>
  <div id="best"></div>
</div>

<div id="game" class="screen hidden">
  <div id="hud">
    <div id="hudLevel">Lv 1</div>
    <div id="timeBarWrap"><div id="timeBar"></div></div>
    <div id="hudTime">60</div>
  </div>
  <div id="canvasWrap">
    <canvas id="cv"></canvas>
    <div id="banner"></div>
  </div>
  <div id="dpad">
    <div class="dbtn" id="btnUp">▲</div>
    <div class="dbtn" id="btnLeft">◀</div>
    <div class="dbtn" id="btnDown">▼</div>
    <div class="dbtn" id="btnRight">▶</div>
  </div>
</div>

<div id="overlay" class="hidden">
  <div id="ovCard">
    <div id="ovTitle"></div>
    <div id="ovMsg"></div>
    <button class="btn" id="ovMain"></button>
    <button class="btn secondary" id="ovMenu">Back to Menu</button>
  </div>
</div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const rnd = n => Math.floor(Math.random() * n);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const DIRS = [[0,-1],[1,0],[0,1],[-1,0]];

/* ================= audio ================= */
let AC = null;
function tone(freq, dur = 0.12, type = 'square', vol = 0.05, when = 0) {
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    const t0 = AC.currentTime + when;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t0); o.stop(t0 + dur + 0.02);
  } catch (e) {}
}
const sfx = {
  go:     () => { tone(523, .1); tone(784, .18, 'square', .05, .12); },
  win:    () => [523, 659, 784, 1047].forEach((f, i) => tone(f, .16, 'triangle', .07, i * .11)),
  caught: () => [420, 310, 230, 160].forEach((f, i) => tone(f, .15, 'sawtooth', .05, i * .1)),
  tick:   () => tone(950, .05, 'square', .035),
};

/* ================= maze ================= */
// wall bits per cell: 1=top 2=right 4=bottom 8=left
let maze = null;
function genMaze(cols, rows) {
  const W = new Uint8Array(cols * rows).fill(15);
  const seen = new Uint8Array(cols * rows);
  const D = [[0,-1,1,4],[1,0,2,8],[0,1,4,1],[-1,0,8,2]];
  const sx = rnd(cols), sy = rnd(rows);
  seen[sy * cols + sx] = 1;
  const stack = [[sx, sy]];
  while (stack.length) {
    const [x, y] = stack[stack.length - 1];
    const opts = [];
    for (const [dx, dy, w, ow] of D) {
      const nx = x + dx, ny = y + dy;
      if (nx >= 0 && ny >= 0 && nx < cols && ny < rows && !seen[ny * cols + nx])
        opts.push([nx, ny, w, ow]);
    }
    if (!opts.length) { stack.pop(); continue; }
    const [nx, ny, w, ow] = opts[rnd(opts.length)];
    W[y * cols + x] &= ~w;
    W[ny * cols + nx] &= ~ow;
    seen[ny * cols + nx] = 1;
    stack.push([nx, ny]);
  }
  // braid: knock out some interior walls so there are escape loops
  const extra = Math.floor(cols * rows * 0.13);
  for (let i = 0; i < extra; i++) {
    const x = 1 + rnd(cols - 2), y = 1 + rnd(rows - 2);
    const [dx, dy, w, ow] = D[rnd(4)];
    W[y * cols + x] &= ~w;
    W[(y + dy) * cols + (x + dx)] &= ~ow;
  }
  return { cols, rows, W };
}
function open_(x, y, dx, dy) {
  const w = maze.W[y * maze.cols + x];
  if (dy < 0) return !(w & 1);
  if (dx > 0) return !(w & 2);
  if (dy > 0) return !(w & 4);
  if (dx < 0) return !(w & 8);
  return false;
}
function bfsFrom(sx, sy) {
  const { cols, rows } = maze;
  const dist = new Int16Array(cols * rows).fill(-1);
  const q = [sy * cols + sx];
  dist[q[0]] = 0;
  for (let h = 0; h < q.length; h++) {
    const c = q[h], x = c % cols, y = (c - x) / cols;
    for (const [dx, dy] of DIRS) {
      if (open_(x, y, dx, dy)) {
        const n = (y + dy) * cols + (x + dx);
        if (dist[n] < 0) { dist[n] = dist[c] + 1; q.push(n); }
      }
    }
  }
  return dist;
}

/* ================= game state ================= */
let state = 'menu';          // menu | ready | play | won | lost
let hero = 'edmund';
let level = 1;
let player = null, enemies = [], ipad = null;
let distField = null, lastPlayerCell = '';
let timeLeft = 60, timeMax = 60, readyT = 0, lastTickSec = -1;
let cellPx = 24, tGlobal = 0;
let bestLevel = +(localStorage.getItem('mazeChaseBest') || 0);

const HERO_COLORS = { edmund: '#3b82f6', matthew: '#ef4444' };
const HERO_NAMES  = { edmund: 'Edmund',  matthew: 'Matthew' };

function levelConfig(lv) {
  const cols = Math.min(7 + Math.floor((lv + 1) / 2) * 2, 15); // 9,9,11,11,13,13,15...
  const rows = Math.min(cols + 4, 19);
  const spd = Math.min(1 + (lv - 1) * 0.05, 1.3);
  const foes = [{ type: 'rival' }];
  for (let i = 0; i < lv - 1 && foes.length < 7; i++)
    foes.push({ type: i % 2 ? 'budgie' : 'shiba' });
  return { cols, rows, spd, foes };
}

function makeEnemy(type, cx, cy, spd, rivalName) {
  const base = {
    rival:  { speed: 1.74 * spd, rand: 0.06, name: rivalName },
    shiba:  { speed: 1.47 * spd, rand: 0.25, name: 'the Shiba Inu' },
    budgie: { speed: 1.94 * spd, rand: 0.35, name: 'the budgie' },
  }[type];
  return {
    type, x: cx + 0.5, y: cy + 0.5,
    dir: { x: 0, y: 0 }, nextDir: null,
    speed: base.speed, rand: base.rand, name: base.name,
    cellKey: cx + ',' + cy, wob: Math.random() * 7,
  };
}

function startLevel(lv) {
  level = lv;
  const cfg = levelConfig(lv);
  maze = genMaze(cfg.cols, cfg.rows);
  player = { x: 0.5, y: 0.5, dir: { x: 0, y: 0 }, nextDir: null, speed: 3.4, cellKey: '0,0' };
  ipad = { cx: cfg.cols - 1, cy: cfg.rows - 1 };
  distField = bfsFrom(0, 0);
  lastPlayerCell = '0,0';
  const goalDist = distField[ipad.cy * cfg.cols + ipad.cx];
  timeMax = timeLeft = clamp(Math.round(goalDist * 0.9) + 14, 25, 99);
  lastTickSec = -1;

  // spawn foes far from the player
  const rivalName = hero === 'edmund' ? 'Matthew' : 'Edmund';
  const minD = Math.max(5, Math.floor(goalDist * 0.4));
  let candidates = [];
  for (let y = 0; y < cfg.rows; y++)
    for (let x = 0; x < cfg.cols; x++) {
      const d = distField[y * cfg.cols + x];
      if (d >= minD && !(x === ipad.cx && y === ipad.cy)) candidates.push([x, y, d]);
    }
  candidates.sort(() => Math.random() - 0.5);
  enemies = [];
  for (const f of cfg.foes) {
    const c = candidates.pop() || [cfg.cols - 1, 0];
    enemies.push(makeEnemy(f.type, c[0], c[1], cfg.spd, rivalName));
  }

  state = 'ready';
  readyT = 2.0;
  $('#hudLevel').textContent = 'Lv ' + lv + ' · ' + HERO_NAMES[hero];
  $('#overlay').classList.add('hidden');
  $('#menu').classList.add('hidden');
  $('#game').classList.remove('hidden');
  resize();
}

/* ================= movement ================= */
function moveEntity(e, dt) {
  const sp = e.speed * dt;
  const cx = Math.floor(e.x), cy = Math.floor(e.y);
  const ccx = cx + 0.5, ccy = cy + 0.5;
  const nd = e.nextDir;
  if (nd && (nd.x !== e.dir.x || nd.y !== e.dir.y)) {
    const moving = e.dir.x !== 0 || e.dir.y !== 0;
    if (moving && nd.x === -e.dir.x && nd.y === -e.dir.y) {
      e.dir = { x: nd.x, y: nd.y };            // reversing is always allowed
    } else {
      const d = Math.abs(e.x - ccx) + Math.abs(e.y - ccy);
      if (d <= Math.max(sp, 0.02) && open_(cx, cy, nd.x, nd.y)) {
        e.x = ccx; e.y = ccy;
        e.dir = { x: nd.x, y: nd.y };
      }
    }
  }
  if (e.dir.x || e.dir.y) {
    let nx = e.x + e.dir.x * sp, ny = e.y + e.dir.y * sp;
    if (!open_(cx, cy, e.dir.x, e.dir.y)) {   // wall ahead: stop at the cell centre
      if (e.dir.x > 0) nx = Math.min(nx, ccx);
      if (e.dir.x < 0) nx = Math.max(nx, ccx);
      if (e.dir.y > 0) ny = Math.min(ny, ccy);
      if (e.dir.y < 0) ny = Math.max(ny, ccy);
    }
    e.x = nx; e.y = ny;
  }
}

function decide(e) {
  const x = Math.floor(e.x), y = Math.floor(e.y);
  const opts = [];
  for (const [dx, dy] of DIRS) if (open_(x, y, dx, dy)) opts.push([dx, dy]);
  if (!opts.length) return;
  let pick = null;
  if (Math.random() < e.rand) {
    const fwd = opts.filter(([dx, dy]) => !(dx === -e.dir.x && dy === -e.dir.y));
    const pool = fwd.length ? fwd : opts;
    pick = pool[rnd(pool.length)];
  } else {
    let best = 1e9;
    for (const [dx, dy] of opts) {
      const d = distField[(y + dy) * maze.cols + (x + dx)];
      if (d >= 0 && d < best) { best = d; pick = [dx, dy]; }
    }
    if (!pick) pick = opts[rnd(opts.length)];
  }
  e.nextDir = { x: pick[0], y: pick[1] };
}

/* ================= update ================= */
function lose(reason, byName) {
  state = 'lost';
  sfx.caught();
  if (navigator.vibrate) navigator.vibrate(200);
  showOverlay(
    reason === 'time' ? "⏰ Time's Up!" : '😱 Caught!',
    reason === 'time'
      ? 'You ran out of time before reaching the iPad. Try a faster route!'
      : 'Oh no, ' + byName + ' caught ' + HERO_NAMES[hero] + '! Try again!',
    'Retry Level ' + level, () => startLevel(level)
  );
}
function win() {
  state = 'won';
  sfx.win();
  if (level > bestLevel) { bestLevel = level; localStorage.setItem('mazeChaseBest', bestLevel); }
  showOverlay('🎉 iPad Time!',
    HERO_NAMES[hero] + ' grabbed the iPad with ' + Math.ceil(timeLeft) + 's to spare!',
    'Level ' + (level + 1) + ' →', () => startLevel(level + 1));
}
function showOverlay(title, msg, btnLabel, btnFn) {
  $('#ovTitle').textContent = title;
  $('#ovMsg').textContent = msg;
  const b = $('#ovMain');
  b.textContent = btnLabel;
  b.onclick = btnFn;
  $('#overlay').classList.remove('hidden');
}

function update(dt) {
  if (state === 'ready') {
    readyT -= dt;
    $('#banner').textContent = readyT > 0.7 ? 'Level ' + level : 'GO!';
    if (readyT <= 0) { state = 'play'; $('#banner').textContent = ''; sfx.go(); }
    return;
  }
  if (state !== 'play') return;

  timeLeft -= dt;
  if (timeLeft <= 0) { timeLeft = 0; lose('time'); return; }
  const sec = Math.ceil(timeLeft);
  if (sec <= 10 && sec !== lastTickSec) { lastTickSec = sec; sfx.tick(); }

  moveEntity(player, dt);
  const pKey = Math.floor(player.x) + ',' + Math.floor(player.y);
  if (pKey !== lastPlayerCell) {
    lastPlayerCell = pKey;
    distField = bfsFrom(Math.floor(player.x), Math.floor(player.y));
  }

  for (const e of enemies) {
    const key = Math.floor(e.x) + ',' + Math.floor(e.y);
    if (key !== e.cellKey || (!e.dir.x && !e.dir.y)) { e.cellKey = key; decide(e); }
    moveEntity(e, dt);
    const dx = e.x - player.x, dy = e.y - player.y;
    if (dx * dx + dy * dy < 0.5 * 0.5) { lose('caught', e.name); return; }
  }

  if (Math.floor(player.x) === ipad.cx && Math.floor(player.y) === ipad.cy) {
    const dx = player.x - (ipad.cx + 0.5), dy = player.y - (ipad.cy + 0.5);
    if (dx * dx + dy * dy < 0.45 * 0.45) win();
  }
}

/* ================= drawing ================= */
const cv = $('#cv'), ctx = cv.getContext('2d');
function resize() {
  if (!maze) return;
  const wrap = $('#canvasWrap');
  const availW = wrap.clientWidth - 8, availH = wrap.clientHeight - 8;
  cellPx = Math.max(14, Math.floor(Math.min(availW / maze.cols, availH / maze.rows)));
  const w = cellPx * maze.cols, h = cellPx * maze.rows;
  const dpr = window.devicePixelRatio || 1;
  cv.style.width = w + 'px'; cv.style.height = h + 'px';
  cv.width = Math.round(w * dpr); cv.height = Math.round(h * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);

function roundRect(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y);
  g.arcTo(x + w, y, x + w, y + h, r);
  g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r);
  g.arcTo(x, y, x + w, y, r);
  g.closePath();
}

function drawKid(g, px, py, s, shirt, t, face, moving) {
  const u = s / 32;
  g.save(); g.translate(px, py + 3 * u);
  if (face < 0) g.scale(-1, 1);
  const step = moving ? Math.sin(t * 12) : 0;
  if (moving) g.translate(0, -Math.abs(Math.cos(t * 12)) * 1.2 * u);
  // legs
  g.fillStyle = '#3f3f52';
  g.fillRect(-5.5 * u + step * 1.6 * u, 6 * u, 4 * u, 7 * u);
  g.fillRect(1.5 * u - step * 1.6 * u, 6 * u, 4 * u, 7 * u);
  // arms
  g.fillStyle = shirt;
  g.fillRect(-9.5 * u, -3 * u, 3 * u, 8 * u);
  g.fillRect(6.5 * u, -3 * u, 3 * u, 8 * u);
  // body
  roundRect(g, -7 * u, -5 * u, 14 * u, 12 * u, 3 * u); g.fill();
  // head (asian skin tone)
  g.fillStyle = '#f2c894';
  g.beginPath(); g.arc(0, -12 * u, 8 * u, 0, 7); g.fill();
  // black hair: cap + fringe
  g.fillStyle = '#171720';
  g.beginPath(); g.arc(0, -12 * u, 8.2 * u, Math.PI, 2 * Math.PI); g.fill();
  g.beginPath();
  g.moveTo(-8.2 * u, -12 * u);
  g.lineTo(-8.2 * u, -9.5 * u); g.lineTo(-5.5 * u, -11 * u);
  g.lineTo(-2.5 * u, -9.5 * u); g.lineTo(0.5 * u, -11 * u);
  g.lineTo(3.5 * u, -9.5 * u); g.lineTo(6 * u, -11 * u);
  g.lineTo(8.2 * u, -9.5 * u); g.lineTo(8.2 * u, -12 * u);
  g.closePath(); g.fill();
  // eyes + mouth
  g.fillStyle = '#26262e';
  g.beginPath(); g.arc(-2.8 * u, -8.5 * u, 1.1 * u, 0, 7); g.fill();
  g.beginPath(); g.arc(2.8 * u, -8.5 * u, 1.1 * u, 0, 7); g.fill();
  g.strokeStyle = '#b06f43'; g.lineWidth = u;
  g.beginPath(); g.arc(0, -6.5 * u, 1.8 * u, 0.3, Math.PI - 0.3); g.stroke();
  g.restore();
}

function drawShiba(g, px, py, s, t, face, moving) {
  const u = s / 32;
  g.save(); g.translate(px, py + 4 * u);
  if (face < 0) g.scale(-1, 1);
  const trot = moving ? Math.sin(t * 14) : 0;
  // curled tail
  g.strokeStyle = '#e0913f'; g.lineWidth = 3 * u; g.lineCap = 'round';
  g.beginPath(); g.arc(-9 * u, -5 * u, 3.5 * u, Math.PI * 0.3, Math.PI * 1.5); g.stroke();
  // legs
  g.fillStyle = '#e8a04a';
  g.fillRect(-8 * u + trot * u, 3 * u, 3 * u, 6 * u);
  g.fillRect(4 * u - trot * u, 3 * u, 3 * u, 6 * u);
  // body
  g.fillStyle = '#efa94f';
  g.beginPath(); g.ellipse(-1 * u, 0, 9.5 * u, 6.5 * u, 0, 0, 7); g.fill();
  g.fillStyle = '#fbe8cf';
  g.beginPath(); g.ellipse(-1 * u, 2.5 * u, 6.5 * u, 3.5 * u, 0, 0, 7); g.fill();
  // head
  g.fillStyle = '#efa94f';
  g.beginPath(); g.arc(7.5 * u, -6 * u, 6 * u, 0, 7); g.fill();
  // ears
  g.beginPath(); g.moveTo(3.5 * u, -10 * u); g.lineTo(5 * u, -14.5 * u); g.lineTo(7.5 * u, -10.5 * u); g.closePath(); g.fill();
  g.beginPath(); g.moveTo(8.5 * u, -11 * u); g.lineTo(11 * u, -14.5 * u); g.lineTo(12 * u, -9.5 * u); g.closePath(); g.fill();
  // muzzle
  g.fillStyle = '#fbe8cf';
  g.beginPath(); g.ellipse(9.5 * u, -3.5 * u, 3.6 * u, 2.8 * u, 0, 0, 7); g.fill();
  // nose + eye
  g.fillStyle = '#3a2b20';
  g.beginPath(); g.arc(12 * u, -4.5 * u, 1.1 * u, 0, 7); g.fill();
  g.beginPath(); g.arc(7 * u, -7 * u, 1.1 * u, 0, 7); g.fill();
  g.restore();
}

function drawBudgie(g, px, py, s, t) {
  const u = s / 32;
  g.save(); g.translate(px, py + Math.sin(t * 6) * 2 * u);
  const flap = Math.sin(t * 22);
  // tail
  g.strokeStyle = '#42a5f5'; g.lineWidth = 2.2 * u; g.lineCap = 'round';
  g.beginPath(); g.moveTo(-4 * u, 6 * u); g.lineTo(-9 * u, 12 * u); g.stroke();
  // wing (behind)
  g.fillStyle = '#66bb6a';
  g.save(); g.translate(-1 * u, 0); g.rotate(flap * 0.7);
  g.beginPath(); g.ellipse(-4 * u, -2 * u, 6.5 * u, 3 * u, -0.6, 0, 7); g.fill();
  g.restore();
  // body
  g.fillStyle = '#7ec850';
  g.beginPath(); g.ellipse(0, 2 * u, 5.5 * u, 7 * u, 0, 0, 7); g.fill();
  // head
  g.fillStyle = '#ffd54f';
  g.beginPath(); g.arc(1 * u, -7.5 * u, 5 * u, 0, 7); g.fill();
  // beak
  g.fillStyle = '#f4a24a';
  g.beginPath(); g.moveTo(5 * u, -8 * u); g.lineTo(9 * u, -6.5 * u); g.lineTo(5 * u, -5 * u); g.closePath(); g.fill();
  // eye
  g.fillStyle = '#222';
  g.beginPath(); g.arc(3 * u, -9 * u, 1.1 * u, 0, 7); g.fill();
  g.restore();
}

function drawIpad(g, px, py, s, t) {
  const u = s / 32;
  // pulsing glow
  const pulse = 0.5 + Math.sin(t * 4) * 0.2;
  const grad = g.createRadialGradient(px, py, 2 * u, px, py, 15 * u);
  grad.addColorStop(0, 'rgba(255,230,109,' + pulse + ')');
  grad.addColorStop(1, 'rgba(255,230,109,0)');
  g.fillStyle = grad;
  g.beginPath(); g.arc(px, py, 15 * u, 0, 7); g.fill();
  g.save(); g.translate(px, py); g.rotate(Math.sin(t * 2) * 0.06);
  g.fillStyle = '#37474f';
  roundRect(g, -7.5 * u, -10 * u, 15 * u, 20 * u, 2.5 * u); g.fill();
  const sg = g.createLinearGradient(0, -8 * u, 0, 7 * u);
  sg.addColorStop(0, '#aee6ff'); sg.addColorStop(1, '#4fc3f7');
  g.fillStyle = sg;
  roundRect(g, -6 * u, -8 * u, 12 * u, 15 * u, 1.5 * u); g.fill();
  // app dots
  const appColors = ['#ef5350', '#ffca28', '#66bb6a', '#ab47bc'];
  for (let i = 0; i < 4; i++) {
    g.fillStyle = appColors[i];
    roundRect(g, -4.5 * u + (i % 2) * 5 * u, -6 * u + Math.floor(i / 2) * 5 * u, 3.4 * u, 3.4 * u, u); g.fill();
  }
  g.fillStyle = '#78909c';
  g.beginPath(); g.arc(0, 8.5 * u, 1.2 * u, 0, 7); g.fill();
  g.restore();
}

function drawMaze(g) {
  const c = cellPx, { cols, rows, W } = maze;
  // floor
  g.fillStyle = '#fdf3dd';
  g.fillRect(0, 0, cols * c, rows * c);
  g.fillStyle = '#f6e9c9';
  for (let y = 0; y < rows; y++)
    for (let x = 0; x < cols; x++)
      if ((x + y) % 2) g.fillRect(x * c, y * c, c, c);
  // walls
  g.strokeStyle = '#6b4f3a';
  g.lineWidth = Math.max(2.5, c * 0.12);
  g.lineCap = 'round';
  g.beginPath();
  for (let y = 0; y < rows; y++)
    for (let x = 0; x < cols; x++) {
      const w = W[y * cols + x];
      if (w & 1) { g.moveTo(x * c, y * c); g.lineTo((x + 1) * c, y * c); }
      if (w & 8) { g.moveTo(x * c, y * c); g.lineTo(x * c, (y + 1) * c); }
      if (x === cols - 1 && (w & 2)) { g.moveTo((x + 1) * c, y * c); g.lineTo((x + 1) * c, (y + 1) * c); }
      if (y === rows - 1 && (w & 4)) { g.moveTo(x * c, (y + 1) * c); g.lineTo((x + 1) * c, (y + 1) * c); }
    }
  g.stroke();
}

function render() {
  if (!maze) return;
  const c = cellPx;
  ctx.clearRect(0, 0, cv.width, cv.height);
  drawMaze(ctx);
  drawIpad(ctx, (ipad.cx + 0.5) * c, (ipad.cy + 0.5) * c, c * 0.95, tGlobal);
  for (const e of enemies) {
    const t = tGlobal + e.wob;
    const face = e.dir.x !== 0 ? e.dir.x : 1;
    const moving = state === 'play' && (e.dir.x !== 0 || e.dir.y !== 0);
    if (e.type === 'rival')
      drawKid(ctx, e.x * c, e.y * c, c * 0.82, HERO_COLORS[hero === 'edmund' ? 'matthew' : 'edmund'], t, face, moving);
    else if (e.type === 'shiba')
      drawShiba(ctx, e.x * c, e.y * c, c * 0.85, t, face, moving);
    else
      drawBudgie(ctx, e.x * c, e.y * c, c * 0.8, t);
  }
  const pFace = player.dir.x !== 0 ? player.dir.x : 1;
  const pMoving = state === 'play' && (player.dir.x !== 0 || player.dir.y !== 0);
  drawKid(ctx, player.x * c, player.y * c, c * 0.82, HERO_COLORS[hero], tGlobal, pFace, pMoving);
  // HUD
  const frac = clamp(timeLeft / timeMax, 0, 1);
  const bar = $('#timeBar');
  bar.style.width = (frac * 100) + '%';
  bar.style.background = frac > 0.4 ? '#6fe08b' : frac > 0.2 ? '#ffd54f' : '#ff6b6b';
  $('#hudTime').textContent = Math.ceil(timeLeft);
}

/* ================= menu previews ================= */
const pvE = $('#pvE').getContext('2d'), pvM = $('#pvM').getContext('2d');
function renderMenu(t) {
  for (const [g, col] of [[pvE, HERO_COLORS.edmund], [pvM, HERO_COLORS.matthew]]) {
    g.clearRect(0, 0, 110, 130);
    drawKid(g, 55, 70, 95, col, t, 1, true);
  }
}

/* ================= input ================= */
function setDir(x, y) {
  if (player) player.nextDir = { x, y };
  if (AC && AC.state === 'suspended') AC.resume();
}
const KEYS = {
  ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
  w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
};
window.addEventListener('keydown', ev => {
  const d = KEYS[ev.key];
  if (d && state !== 'menu') { ev.preventDefault(); setDir(d[0], d[1]); }
});
for (const [id, d] of [['#btnUp',[0,-1]],['#btnDown',[0,1]],['#btnLeft',[-1,0]],['#btnRight',[1,0]]]) {
  $(id).addEventListener('pointerdown', ev => { ev.preventDefault(); setDir(d[0], d[1]); });
}
// swipe on the maze
let touchX = 0, touchY = 0;
const wrap = $('#canvasWrap');
wrap.addEventListener('touchstart', ev => {
  touchX = ev.touches[0].clientX; touchY = ev.touches[0].clientY;
}, { passive: true });
wrap.addEventListener('touchmove', ev => {
  const dx = ev.touches[0].clientX - touchX, dy = ev.touches[0].clientY - touchY;
  if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) setDir(Math.sign(dx), 0);
  else setDir(0, Math.sign(dy));
  touchX = ev.touches[0].clientX; touchY = ev.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchmove', ev => ev.preventDefault(), { passive: false });

/* ================= wiring ================= */
let startLv = 1;
const LV_MAX = 20;
const FOE_ICONS = { rival: '👦', shiba: '🐕', budgie: '🐦' };
function updateLevelSel() {
  $('#lvlLabel').textContent = 'Level ' + startLv;
  $('#lvlFoes').textContent = levelConfig(startLv).foes.map(f => FOE_ICONS[f.type]).join(' ');
  $('#lvlMinus').disabled = startLv <= 1;
  $('#lvlPlus').disabled = startLv >= LV_MAX;
}
$('#lvlMinus').addEventListener('click', () => {
  if (startLv > 1) { startLv--; tone(440, .06); updateLevelSel(); }
});
$('#lvlPlus').addEventListener('click', () => {
  if (startLv < LV_MAX) { startLv++; tone(550, .06); updateLevelSel(); }
});
updateLevelSel();

document.querySelectorAll('.card').forEach(card => {
  card.addEventListener('click', () => {
    hero = card.dataset.hero;
    tone(660, .08); // unlock audio on user gesture
    startLevel(startLv);
  });
});
$('#ovMenu').addEventListener('click', () => {
  state = 'menu';
  $('#overlay').classList.add('hidden');
  $('#game').classList.add('hidden');
  $('#menu').classList.remove('hidden');
  updateBest();
});
function updateBest() {
  $('#best').textContent = bestLevel ? '⭐ Best: reached Level ' + bestLevel : '';
}
updateBest();

/* ================= main loop ================= */
let lastT = performance.now();
function frame(now) {
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;
  tGlobal += dt;
  if (state === 'menu') renderMenu(tGlobal);
  else { update(dt); render(); }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// debug handle (harmless in production)
window.dbg = {
  get state() { return state; }, get level() { return level; },
  get player() { return player; }, get enemies() { return enemies; },
  get maze() { return maze; }, get ipad() { return ipad; },
  get timeLeft() { return timeLeft; },
  start: (h, lv) => { hero = h || 'edmund'; startLevel(lv || 1); },
  step: dt => { update(dt); render(); },
};
</script>
</body>
</html>
